spring.application.name=Raqaf

# ===== H2 In-Memory Database (local dev - no setup needed) =====
spring.datasource.url=jdbc:h2:mem:ecommercedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console - visit http://localhost:8080/h2-console after running
# JDBC URL to use in the console login screen: jdbc:h2:mem:ecommercedb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# ===== Logging =====
logging.level.com.example.ecommerce=DEBUG
logging.level.org.springframework.security=DEBUG

# ===== Swagger / OpenAPI docs =====
# Once running, visit http://localhost:8080/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html